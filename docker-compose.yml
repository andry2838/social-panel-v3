version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./accounts:/app/accounts
      - ./logs:/app/logs
    environment:
      - REDIS_URL=redis://redis:6379/0

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    restart: always
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./accounts:/app/accounts
    environment:
      - API_URL=http://api:8000/api/v1

  celery:
    build: .
    command: celery -A scheduler.celery_app worker -l info --concurrency=10 --max-tasks-per-child=50
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./accounts:/app/accounts
      - ./logs:/app/logs
    environment:
      - REDIS_URL=redis://redis:6379/0

  beat:
    build: .
    command: celery -A scheduler.celery_app beat -l info
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./accounts:/app/accounts
      - ./logs:/app/logs
    environment:
      - REDIS_URL=redis://redis:6379/0
